name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install in editable mode with dev dependencies
        pip install -e ".[dev]"
        
    - name: Run Quality Checks
      run: |
        black --check .
        isort --check-only .
        # Catch critical syntax errors and undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Core Architecture Smoke Tests
      env:
        # Inject dummy vars so Pydantic config validation passes purely
        GEMINI_API_KEY: "dummy_key_for_ci_pipeline"
        ENV: "development"
      run: |
        # Run the custom verification suite we built
        python verify_implementation.py
        
  # Optional: Deploy job could be added here later (e.g., Docker build, HF Hub sync)