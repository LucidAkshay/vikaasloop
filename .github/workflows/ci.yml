name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Quality Checks
        run: |
          black --check .
          isort --check-only .
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Pre-flight Directory Check
        run: |
          # Create all folders ignored by git but needed for runtime
          mkdir -p logs data/generated data/eval models eval_results

      - name: Run Verification Suite
        env:
          # We provide dummy keys so the Config validator doesn't crash
          GEMINI_API_KEY: "static_test_key_non_functional"
          JWT_SECRET: "ci_pipeline_secret_key_12345"
        run: |
          python verify_implementation.py